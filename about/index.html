<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>

    <meta name="description" content="The about-page of Monkadex by Simonkamon11">
    <meta name="keywords" content="about-page, pokémon, pokédex">
    <meta name="author" content="Simon Aarseth">

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../images/pokeballs/pokeball_pokedex.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body id="about-body">
    <div id="header">
        <div id="logo-container" class="clickable" onclick="window.location.href = 'https://simonkamon11.github.io/monkadex/';">
            <img src="../images/pokeballs/pokeball_pokedex.png" id="logo-img">
            <h1 class="header-text" id="logo-text">Monkadex</h1>
        </div>
        <div id="header-pages-menu">
            <div class="clickable" id="header-pages-text-container" onclick="
            switch(document.getElementById('header-pages-dropdown-menu').style.display) {
                case('none'): document.getElementById('header-pages-dropdown-menu').style.display = 'block'; break;
                default: document.getElementById('header-pages-dropdown-menu').style.display = 'none'; break;
            }">
                <h2 id="header-pages-text">Other pages</h2>
                <img src="" id="dropdown-arrow">
            </div>
            <div id="header-pages-dropdown-menu">
                <h2 class="pageLink clickable"  onclick="window.location.href = 'https://simonkamon11.github.io/monkadex/locations/'">locations</h2>
                <h2 class="pageLink clickable"  onclick="window.location.href = 'https://simonkamon11.github.io/monkadex/shinytools/'">shinytools</h2>
                <h2 class="pageLink clickable" onclick="window.location.href = 'https://simonkamon11.github.io/monkadex/moves/'">moves</h2>
                <h2 class="pageLink clickable" onclick="window.location.href = 'https://simonkamon11.github.io/monkadex/about/'">about</h2>
                <h2 class="pageLink clickable" onclick="window.location.href = 'https://simonkamon11.github.io/monkadex/sitemap.html'">sitemap</h2>
            </div>
        </div>
        <script>
            black = 'rgb(0, 0, 0)';
            white = 'rgb(255, 255, 255)';
            if(window.matchMedia("(prefers-color-scheme: dark)").matches) {
                colour1 = black
                colour2 = white
                document.getElementById('dropdown-arrow').src = '../images/arrow_white.png'
            }
            else {
                colour1 = white
                colour2 = black
                document.getElementById('dropdown-arrow').src = '../images/arrow_black.png'
            }
            document.getElementById('header').style['background-color'] = colour1
            document.getElementById('logo-text').style['color'] = colour2
            document.getElementById('header-pages-dropdown-menu').style['background-color'] = colour1
            document.getElementById('header-pages-text').style['color'] = colour2
            document.querySelectorAll('.pageLink').forEach(el => el.style['color'] = colour2)
        </script>
    </div>
    
    <div id="header-border"></div>

    <h1 id="title" class="text">About</h1>
    <h2 id="owner" class="text">Monkadex by Simonkamon11</h2>

    <h2 class="text title-text-about-page">Sources:</h2>
    <div class="source-container">
        <h3 class="text link-pointer">All data: </h3>
        <h3 class="text clickable link" onclick="window.open('https://pokeapi.co', '_blank');">https://pokeapi.co</h3>
    </div>
    <div class="source-container">
        <h3 class="text link-pointer">Bitcount Single font: </h3>
        <h3 class="text clickable link" onclick="window.open('https://fonts.google.com/specimen/Bitcount+Single', '_blank');">https://fonts.google.com/specimen/Bitcount+Single</h3>
    </div>

    <script type="module" src="../script.js"></script>
</body>
</html>
