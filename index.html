<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monkadex</title>

    <meta name="description" content="A pokédex created by Simon Aarseth">
    <meta name="keywords" content="pokémon, pokédex, pikachu">
    <meta name="author" content="Simon Aarseth">

    <meta property="og:title" content="Monkadex">
    <meta property="og:description" content="Monkadex: Pokédex by Simonkamon11">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://simonkamon11.github.io/monkadex/images/pokeballs/pokeball_dark.png">
    <link rel="icon" href="images/pokeballs/pokeball_pokedex.png" type="image/x-icon">

    <meta name="google-site-verification" content="Op-umb3OSG__1x3ZN32ioLroTl8Cs2zviCj1dNvSYbU" />

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body id="body">
    <div id="header">
        <div id="logo-container" class="clickable" onclick="window.location.href = 'https://simonkamon11.github.io/monkadex';">
            <img src="images/pokeballs/pokeball_pokedex.png" id="logo-img">
            <h1 class="header-text" id="logo-text">Monkadex</h1>
        </div>
        <script>
            black = 'rgb(0, 0, 0)';
            white = 'rgb(255, 255, 255)';
            if(window.matchMedia("(prefers-color-scheme: dark)").matches) {
                colour1 = black
                colour2 = white
            }
            else {
                colour1 = white
                colour2 = black
            }
            document.getElementById('header').style['background-color'] = colour1
            document.getElementById('logo-text').style['color'] = colour2
        </script>
    </div>

    <div id="themes-text-container">
        <h2 class="text" id="themes-text">themes: </h2>
        <div id="themes-container">
            <div class="theme-container">
                <img src="images/pokeballs/pokeball_pokedex.png" alt="" class="theme-img">
                <h2 class="theme text clickable" onclick="switchTheme('pokedex')">pokédex</h2>
            </div>
            <div class="theme-container">
                <img src="images/pokeballs/pokeball_dark.png" alt="" class="theme-img">
                <h2 class="theme text clickable" onclick="switchTheme('dark')">dark</h2>
            </div>
            <div class="theme-container">
                <img src="images/pokeballs/pokeball_light.png" alt="" class="theme-img">
                <h2 class="theme text clickable" onclick="switchTheme('light')">light</h2>
            </div>
            <div class="theme-container">
                <img src="images/pokeballs/pokeball_gameboy.png" alt="" class="theme-img">
                <h2 class="theme text clickable" onclick="switchTheme('gameboy')">gameboy</h2>
            </div>
        </div>
    </div>
    <h1 id="title" class="text">Monkadex</h1>
    <h2 id="owner" class="text">Pokédex by Simonkamon11</h2>
    <input type="text" id="pokemonInput" placeholder="Enter Pokémon name">
    <button onclick="fetchData()" id="fetch-button" class="clickable">Fetch data</button><br>
    <div id="fetchText-container">
        <p id="fetchText" class="text"></p>
        <div id="didYou-container"></div>
    </div>

    <div class="name-type-container">
        <h1 id="pokemonName" class="text pokemonName"></h1>
        <img src="" alt="type1" id="type1" style="display: none;">
        <img src="" alt="type2" id="type2" style="display: none;">
    </div>
    <h2 id="pokemonSpecies" class="text pokemonSpecies"></h2>
    <div id="pokemonImages-container">
        <img src="" alt="Pokémon Sprite" id="pokemonSprite" style="display: none;" class="pokemonImages">
        <div class="corner-icon-container">
            <img src="" alt="Pokémon Shiny Sprite" id="shinySprite" style="display: none;" class="pokemonImages"> 
            <img src="images/shiny_sparkles.png" alt="shiny sparkles" id="shiny-sparkles" class="corner-icon" style="display: none;">
        </div>
    </div>

    <h2 id="pokedexNr" class="text pokedexNr"></h2>

    <h2 id="statsText" class="title-text clickable" style="display: none;" onclick="
    switch(document.getElementById('stats-container').style.display) {
        case('none'): document.getElementById('stats-container').style.display = 'block'; break;
        default: document.getElementById('stats-container').style.display = 'none'; break;
    }">Base stats:</h2>
    <div id="stats-container">
        <h2 class="stats" id="hpStat"></h2>
        <h2 class="stats" id="atkStat"></h2>
        <h2 class="stats" id="defStat"></h2>
        <h2 class="stats" id="spAtkStat"></h2>
        <h2 class="stats" id="spDefStat"></h2>
        <h2 class="stats" id="speedStat"></h2>
        <h2 id="baseStatTotal" class="text"></h2>
    </div>

    <h2 id="damageMultipliers" class="title-text clickable" style="display: none;" onclick="
    switch(document.getElementById('damage-multipliers-container').style.display) {
        case('none'): document.getElementById('damage-multipliers-container').style.display = 'block'; break;
        default: document.getElementById('damage-multipliers-container').style.display = 'none'; break;
    }">Damage multipliers:</h2>
    <div id="damage-multipliers-container"></div>

    <h2 id="genderDifferencesText" class="title-text clickable" style="display: none;" onclick="
    switch(document.getElementById('gender-closable-container').style.display) {
        case('none'): document.getElementById('gender-closable-container').style.display = 'block'; break;
        default: document.getElementById('gender-closable-container').style.display = 'none'; break;
    }">Gender differences:</h2>

    <div id="gender-closable-container" >
        <div id="gender-container">
            <div class="corner-icon-container">
                <img src="" alt="Pokémon Male Sprite" id="maleSprite" style="display: none;" class="pokemonImages"> 
                <img src="images/male.png" alt="male icon" id="maleIcon" class="corner-icon" style="display: none;">
            </div>
            <div class="corner-icon-container">
                <img src="" alt="Pokémon Female Sprite" id="femaleSprite" style="display: none;" class="pokemonImages">
                <img src="images/female.png" alt="female icon" id="femaleIcon" class="corner-icon" style="display: none;">
            </div>
        </div>
    </div>

    <h2 id="abilitiesText" class="title-text clickable" style="display: none;" onclick="
    switch(document.getElementById('abilities-container').style.display) {
        case('none'): document.getElementById('abilities-container').style.display = 'block'; break;
        default: document.getElementById('abilities-container').style.display = 'none'; break;
    }">Abilities:</h2>
    <div id="abilities-container"></div>

    <h2 id="measurementsText" class="title-text clickable" style="display: none;" onclick="
    switch(document.getElementById('measurements-container').style.display) {
        case('none'): document.getElementById('measurements-container').style.display = 'block'; break;
        default: document.getElementById('measurements-container').style.display = 'none'; break;
    }">Measurements:</h2>
    <div id="measurements-container">
        <h2 id="height" class="text"></h2>
        <h2 id="weight" class="text"></h2>
    </div>
    <h2 id="preEvoText" class="title-text clickable" style="display: none;" onclick="
    switch(document.getElementById('preEvo-container').style.display) {
        case('none'): document.getElementById('preEvo-container').style.display = 'block'; break;
        default: document.getElementById('preEvo-container').style.display = 'none'; break;
    }">Previous evolution:</h2>
    <div id="preEvo-container">
        <div class="name-type-container">
            <h2 id="preEvoName" class="text pokemonName clickable" style="display: none;"></h2>
            <img src="" alt="type1" id="preEvoType1" style="display: none;">
            <img src="" alt="type2" id="preEvoType2" style="display: none;">
        </div>
        <h2 id="preEvoSpecies" class="text pokemonSpecies" style="display: none;"></h2>
        <img src="" alt="" class="pokemonImages" id="preEvoImg" style="display: none;">
        <h2 id="preEvoPokedexNr" class="text pokedexNr"></h2>
    </div>

    <h2 id="nextEvosText" class="title-text clickable" style='display: none;' onclick="
    switch(document.getElementById('nextEvos-container').style.display) {
        case('none'): document.getElementById('nextEvos-container').style.display = 'block'; break;
        default: document.getElementById('nextEvos-container').style.display = 'none'; break;
    }"></h2>
    <div id="nextEvos-container">

    </div>

    <script src="index.js"></script>
</html>
